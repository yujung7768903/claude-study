name: Claude Issue Handler

on:
  issues:
    types: [labeled]

jobs:
  handle-issue:
    runs-on: ubuntu-latest

    # claude 라벨이 있을 때만 실행
    if: contains(github.event.issue.labels.*.name, 'claude')

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check if branch already exists
        id: check
        run: |
          BRANCH="claude/issue-${{ github.event.issue.number }}"
          git fetch origin
          if git show-ref --verify --quiet "refs/remotes/origin/$BRANCH"; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Create branch
        id: branch
        if: steps.check.outputs.exists == 'false'
        run: |
          BRANCH="claude/issue-${{ github.event.issue.number }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git push origin "$BRANCH"
          echo "name=$BRANCH" >> $GITHUB_OUTPUT

      - name: Run Claude Code Action
        if: steps.check.outputs.exists == 'false'
        uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          direct_prompt: |
            GitHub Issue #${{ github.event.issue.number }}을 처리해주세요.

            제목: ${{ github.event.issue.title }}

            내용:
            ${{ github.event.issue.body }}

            현재 브랜치: ${{ steps.branch.outputs.name }}

            지시사항:
            - 이슈 내용을 분석하고 필요한 코드 변경을 수행하세요.
            - 변경 후 현재 브랜치에 커밋하고 push하세요.

      - name: Create Draft PR
        if: steps.check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --title "${{ github.event.issue.title }}" \
            --body "Closes #${{ github.event.issue.number }}" \
            --base main \
            --head "claude/issue-${{ github.event.issue.number }}" \
            --draft
